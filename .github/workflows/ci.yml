name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Test (patterns + engine)
        run: pytest -q

  # Dogfood: the action defined in this repo, run against this repo. The six
  # accepted findings are the synthetic samples inside build_patterns.py's DATA
  # (JWT/PEM/GCP markers); the committed baseline suppresses exactly those, so
  # any NEW secret-shaped string entering the tree fails this job.
  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ./
        with:
          path: .
          min-confidence: probable
          baseline: .regextokens-baseline.json
